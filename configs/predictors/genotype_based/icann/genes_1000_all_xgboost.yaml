metadata:
  source: "genes_1000_all_icann.yaml"
  paper: "ICANN accepted paper"
  migration_mode: "raw_center_crop"
  note: "PCA+XGBoost configuration adapted from the accepted-paper experiment config."
  pca_selection: "pca_components is the operational value selected from the cumulative explained variance analysis; regenerate the curve with genomics genotype pca-variance."

dataset_input:
  dataset_id: "1kg_high_coverage"
  processed_cache_dir: "results/cache/genotype_based_predictor"
  results_dir: "results/genotype_based_predictor/icann/runs"
  cache_processed_tensors: true
  tensor_layout: "raw_center_crop"
  feature_mode: "signals_only"
  alphagenome_outputs: ["rna_seq"]
  haplotype_mode: "H1"
  window_center_size: 32768
  downsample_factor: 1
  genes_to_use: ["MC1R", "TYRP1", "TYR", "SLC45A2", "DDB1", "EDAR", "MFSD12", "OCA2", "HERC2", "SLC24A5", "TCHH"]
  normalization_method: "log"
  normalization_value: 0.0
  normalization_fit_splits: ["train", "val", "test"]
  normalization_fit_sample_fraction: 1.0
  normalization_fit_min_samples: 0
  normalization_fit_min_samples_per_class: 0
  normalization_fit_random_seed: 13
  normalization_fit_stratify: true

output:
  prediction_target: "superpopulation"
  known_classes: null

model:
  type: "XGBOOST"
  hidden_layers: [100, 40]
  activation: "relu"
  dropout_rate: 0.5
  sklearn:
    pca_components: 300
    pca_fit_sample_fraction: 1.0
    pca_fit_min_samples: 0
    pca_fit_min_samples_per_class: 0
    pca_fit_random_seed: 13
    pca_fit_stratify: true
    pca_backend: "incremental"
    randomized_pca_oversampling: 16
    randomized_pca_n_iter: 2
    randomized_pca_feature_chunk_size: 4096
    randomized_pca_dtype: "float32"
    use_pca_cache: true
    pca_align_n_train: false
    xgboost:
      n_estimators: 200
      max_depth: 4
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      tree_method: "hist"
      random_state: 42
      n_jobs: -1
      eval_metric: "mlogloss"

data_loading:
  loading_strategy: "lazy"

training:
  optimizer: "adam"
  learning_rate: 0.001
  weight_decay: 0.0001
  loss_function: "cross_entropy"
  batch_size: 16
  num_epochs: 1
  validation_frequency: 1
  lr_scheduler:
    enabled: false

data_split:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 13
  family_split_mode: "family_aware"
  balancing_strategy: "shuffle"
  strict_determinism: true

wandb:
  use_wandb: true
  project_name: "genotype-based-predictor-icann"
  run_name: "genes-1000-all-xgboost-pca300"
  log_frequency: 100

checkpointing:
  checkpoint_dir: "models"
  save_during_training: true
  save_frequency: 100
  load_checkpoint: null

debug:
  enable_visualization: false
  force_pca_cache_rebuild: false
  max_samples_per_epoch: null
  visualization: {}
  taint_at_cache_save: false
  taint_at_runtime: false

evaluation:
  confidence_intervals:
    enabled: true
    method: "stratified_bootstrap"
    n_bootstrap: 2000
    confidence_level: 0.95
    random_seed: 13

stability_analysis:
  enabled: true
  strategy: "repeated_random_split"
  n_repeats: 5
  n_splits: 5
  val_split: null
  random_seed: 13
  stratify: true
  selection_metric: "accuracy"
  split_plan_path: "results/genotype_based_predictor/icann/stability/shared_dev_split_plan_seed13.json"
  reuse_split_plan: true
  output_dir: "results/genotype_based_predictor/icann/stability/xgboost_pca300"

mode: "train"
test_dataset: "test"
