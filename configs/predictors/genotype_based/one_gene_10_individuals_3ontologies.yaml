dataset_input:
  dataset_dir: "/dados/GENOMICS_DATA/v1/1kG_high_coverage"
  alphagenome_outputs:
    - "rna_seq"
  haplotype_mode: "H1+H2"
  window_center_size: 32768
  downsample_factor: 1
  genes_to_use:
    - "MC1R"
  sample_ids_path: "/home/breno/I2CA/genomics/genotype_based_predictor/views/one_gene_10_individuals.sample_ids.txt"
  superpopulations_to_use: null
  populations_to_use: null
  ontology_terms:
    - "CL:1000458"
    - "CL:0000346"
    - "CL:2000092"
  normalization_method: "log"
  processed_cache_dir: "results/cache/genotype_based_predictor"
  results_dir: "results/genotype_based_predictor/runs"
  cache_processed_tensors: true
  tensor_layout: "haplotype_channels"
  ontology_terms: ["CL:1000458", "CL:0000346", "CL:2000092"]
  selected_track_index: 0
  indel_include_valid_mask: true
  alignment_mapping: "bcftools_chain"
  consensus_dataset_dir: "/dados/GENOMICS_DATA/v1/1kG_high_coverage"
  normalization_value: 4.34

output:
  prediction_target: "superpopulation"
  known_classes: null

model:
  type: "CNN2"
  hidden_layers: [64, 32]
  activation: "relu"
  dropout_rate: 0.3
  cnn2:
    num_filters_stage1: 4
    kernel_stage1: [1, 16]
    num_filters_stage2: 8
    kernel_stage2: 5
    num_filters_stage3: 16
    kernel_stage3: 3
    global_pool_type: "avg"
    fc_hidden_size: 64

training:
  optimizer: "adam"
  learning_rate: 0.001
  weight_decay: 0.0001
  loss_function: "cross_entropy"
  batch_size: 1
  num_epochs: 1
  validation_frequency: 1
  lr_scheduler:
    enabled: true
    type: "cosine_warm_restarts"
    mode: "min"
    factor: 0.5
    patience: 10
    min_lr: 0.0000001
    step_size: 10
    T_max: 30
    eta_min: 0.0000001
    T_0: 10
    T_mult: 1

data_split:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 13
  family_split_mode: "family_aware"
  balancing_strategy: "shuffle"
  strict_determinism: true

wandb:
  use_wandb: false
  project_name: "genotype-based-predictor-one-gene-10-individuals-3ontologies"
  run_name: null
  log_frequency: 10

checkpointing:
  checkpoint_dir: "models"
  save_frequency: 10
  save_during_training: true
  load_checkpoint: null

debug:
  enable_visualization: false
  force_pca_cache_rebuild: false
  max_samples_per_epoch: null
  taint_at_cache_save: false
  taint_at_runtime: false
  visualization: {}

data_loading:
  loading_strategy: "lazy"
  cache_size: 16

mode: "train"
test_dataset: "test"
