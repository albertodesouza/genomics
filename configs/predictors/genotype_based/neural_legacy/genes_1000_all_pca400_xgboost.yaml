metadata:
  migrated_from: "neural_ancestry_predictor PCA+XGBoost baseline"
  migration_mode: "raw_center_crop"
  note: "Historical PCA400+XGBoost baseline without genotype/INDEL alignment."

dataset_input:
  dataset_id: "1kg_high_coverage"
  processed_cache_dir: "results/cache/genotype_based_predictor/neural_legacy"
  results_dir: "results/genotype_based_predictor/runs"
  cache_processed_tensors: true
  tensor_layout: "raw_center_crop"
  feature_mode: "signals_only"
  alphagenome_outputs:
    - "rna_seq"
  haplotype_mode: "H1+H2"
  window_center_size: 32768
  downsample_factor: 1
  genes_to_use:
    - "MC1R"
    - "TYRP1"
    - "TYR"
    - "SLC45A2"
    - "DDB1"
    - "EDAR"
    - "MFSD12"
    - "OCA2"
    - "HERC2"
    - "SLC24A5"
    - "TCHH"
  normalization_method: "log"
  normalization_value: 0.0

output:
  prediction_target: "superpopulation"
  known_classes: ["AFR", "AMR", "EAS", "EUR", "SAS"]

model:
  type: "XGBOOST"
  sklearn:
    pca_components: 400
    pca_backend: "randomized_streaming"
    randomized_pca_oversampling: 32
    randomized_pca_n_iter: 2
    randomized_pca_feature_chunk_size: 8192
    randomized_pca_dtype: "float64"
    use_pca_cache: true
    pca_align_n_train: false
    xgboost:
      n_estimators: 400
      max_depth: 6
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      tree_method: "hist"
      random_state: 13
      n_jobs: -1
      eval_metric: "mlogloss"

training:
  optimizer: "adam"
  learning_rate: 0.001
  weight_decay: 0.0
  loss_function: "cross_entropy"
  batch_size: 16
  num_epochs: 1
  validation_frequency: 1
  lr_scheduler:
    enabled: false

data_split:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 13
  family_split_mode: "family_aware"
  balancing_strategy: "shuffle"
  strict_determinism: true

wandb:
  use_wandb: false
  project_name: "genotype-based-predictor-pca400-xgboost-raw-center-crop"
  run_name: null
  log_frequency: 100

checkpointing:
  checkpoint_dir: "models"
  save_frequency: 100
  save_during_training: true
  load_checkpoint: null

debug:
  enable_visualization: false
  force_pca_cache_rebuild: false
  max_samples_per_epoch: null
  taint_at_cache_save: false
  taint_at_runtime: false
  visualization: {}

data_loading:
  loading_strategy: "lazy"
  cache_size: 50

mode: "train"
test_dataset: "test"
