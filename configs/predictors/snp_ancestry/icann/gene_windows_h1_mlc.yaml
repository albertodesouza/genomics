# ICANN paper SNP MLC baseline restricted to SNPs inside the CNN 32,768 bp gene windows.

input:
  dataset_id: "1kg_high_coverage"
  genotype_cache_dir: "../../../../results/cache/genotype_based_predictor/datasets/rna_seq_H1_32768_ds1_log_shuf_ont1_view0436a3bba883"
  genotype_config: "../../genotype_based/icann/genes_1000_all_cnn2.yaml"
  window_center_size: 32768
  genes_to_use:
    - "MC1R"
    - "TYRP1"
    - "TYR"
    - "SLC45A2"
    - "DDB1"
    - "EDAR"
    - "MFSD12"
    - "OCA2"
    - "HERC2"
    - "SLC24A5"
    - "TCHH"
  chromosomes:
    - "chr1"
    - "chr2"
    - "chr5"
    - "chr9"
    - "chr11"
    - "chr15"
    - "chr16"
    - "chr19"

conversion:
  format_version: "V5"
  skip_no_rsid: true
  annotate_dbsnp: true
  genome_build: "GRCh38"
  filter_by_chip_panel: true
  ref_dir: "refs"
  snp_panel: null
  parallel_chroms: "auto"
  output_filename: "{sample_id}_icann_gene_windows_h1_23andme.txt"

statistics:
  output_dir: "../../../results/snp_ancestry_predictor/icann/statistics_gene_windows_h1"
  reference_subsets:
    - "train"
  min_maf: 0.001
  max_snps: null
  snp_panel: null

prediction:
  level: "superpopulation"
  haplotype_mode: "H1"
  method: "mle"
  evaluation_subsets:
    - "train"
    - "val"
    - "test"
  results_dir: "../../../results/snp_ancestry_predictor/icann/ancestry_results_gene_windows_h1"
  admixture_em:
    max_iter: 1000
    tol: 1.0e-7
  admixture_mle:
    n_restarts: 20

pipeline:
  steps:
    generate_23andme: true
    compute_statistics: true
    predict_ancestry: true
