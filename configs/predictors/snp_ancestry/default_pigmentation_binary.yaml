# ═══════════════════════════════════════════════════════════════
# SNP Ancestry Predictor — Pigmentation Binary Configuration
# ═══════════════════════════════════════════════════════════════
#
# This config runs binary classification:
#   - "strong pigmentation"
#   - "weak pigmentation"
#
# It mirrors the population grouping used by:
#   neural_ancestry_predictor/configs/pigmentation_binary.yaml
#
# Usage:
#   source scripts/env/start_genomics_universal.sh
#   genomics snp-ancestry run --config configs/predictors/snp_ancestry/default_pigmentation_binary.yaml

# ── Input Data ────────────────────────────────────────────────
input:
  dataset_id: "1kg_high_coverage"
  # Family-aware splits generated/cached by neural_ancestry_predictor.
  genotype_cache_dir: "../../../results/cache/genotype_based_predictor/datasets/rna_seq_H1+H2_32768_ds1_log_shuf_ont3_view9d9f894aa231"

  # Multi-sample VCF pattern defaults to dataset_id metadata.

  # Chromosomes to process (chrX naming variations are handled automatically).
  chromosomes:
    - "chr1"
    - "chr2"
    - "chr3"
    - "chr4"
    - "chr5"
    - "chr6"
    - "chr7"
    - "chr8"
    - "chr9"
    - "chr10"
    - "chr11"
    - "chr12"
    - "chr13"
    - "chr14"
    - "chr15"
    - "chr16"
    - "chr17"
    - "chr18"
    - "chr19"
    - "chr20"
    - "chr21"
    - "chr22"
    - "chrX"

# ── VCF-to-23andMe Conversion (Step 1) ───────────────────────
conversion:
  format_version: "V5"
  skip_no_rsid: true
  annotate_dbsnp: true
  genome_build: "GRCh38"
  filter_by_chip_panel: true
  ref_dir: "results/snp_ancestry_predictor/refs"
  snp_panel: null

  # Parallel chromosome jobs in Step 1 (worker processes). See default.yaml.
  parallel_chroms: "auto"

  # The _all individuals dir contains multiple 23andMe variants per sample
  # (e.g. {sample_id}_23andme.txt was generated with a small AISNP panel).
  # Use the V5 files (a strict superset of the gene-window panel applied in
  # statistics.snp_panel below).
  output_filename: "{sample_id}_v5_23andme.txt"

# ── Statistics Computation (Step 2) ──────────────────────────
statistics:
  # Keep statistics and prediction results under the *_all dataset root.
  output_dir: "../../../results/snp_ancestry_predictor/statistics_pigmentation"
  reference_subsets:
    - "train"
  min_maf: 0.001
  max_snps: 500000
  snp_panel: "results/snp_ancestry_predictor/refs/panel_23andme_V5_genes_1000_w32768.txt"

# ── Ancestry / Derived Prediction (Step 3) ───────────────────
prediction:
  # Derived level name. This must match a key inside derived_targets.
  level: "pigmentation"

  # Build classes from the source metadata field.
  derived_targets:
    pigmentation:
      source_field: "population"
      exclude_unmapped: true
      class_map:
        strong pigmentation:
          - "YRI"
          - "ESN"
          - "LWK"
          - "MSL"
          - "GWD"
        weak pigmentation:
          - "FIN"
          - "CEU"
          - "GBR"

  haplotype_mode: "H1"
  method: "mle"
  evaluation_subsets:
    - "train"
    - "val"
    - "test"

  results_dir: "../../../results/snp_ancestry_predictor/ancestry_results_pigmentation"

  admixture_em:
    max_iter: 1000
    tol: 1.0e-7

  admixture_mle:
    n_restarts: 20

# ── Pipeline Control ─────────────────────────────────────────
pipeline:
  steps:
    generate_23andme: true
    compute_statistics: true
    predict_ancestry: true
