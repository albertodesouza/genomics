# Binary pigmentation classification using selected 1000G populations only.
# Matches neural_ancestry_predictor/configs/pigmentation_binary.yaml target labels.

input:
  dataset_id: "1kg_high_coverage"
  genotype_cache_dir: "/dados/GENOMICS_DATA/v1/1kG_high_coverage_runs/datasets/rna_seq_H1+H2_32768_ds1_log_shuf_ont3_view9d9f894aa231"
  validate_family_aware_splits: false

conversion:
  output_filename: "{sample_id}_v5_23andme.txt"
  skip_no_rsid: true
  filter_by_chip_panel: true
  format_version: "V5"
  annotate_dbsnp: true
  genome_build: "GRCh38"

statistics:
  output_dir: "../../../results/snp_ancestry_predictor/statistics_pigmentation_binary"
  reference_subsets:
    - "train"
  min_maf: 0.001
  max_snps: 500000
  snp_panel: null

output:
  prediction_target: "pigmentation"
  known_classes:
    - "strong pigmentation"
    - "weak pigmentation"
  derived_targets:
    pigmentation:
      source_field: "population"
      exclude_unmapped: true
      class_map:
        strong pigmentation: ["YRI", "ESN", "LWK", "MSL", "GWD"]
        weak pigmentation: ["FIN", "CEU", "GBR"]

prediction:
  haplotype_mode: "H1"
  method: "mle"
  evaluation_subsets:
    - "train"
    - "val"
    - "test"
  results_dir: "../../../results/snp_ancestry_predictor/ancestry_results_pigmentation_binary"
  admixture_em:
    max_iter: 1000
    tol: 1.0e-7
  admixture_mle:
    n_restarts: 20

pipeline:
  steps:
    generate_23andme: true
    compute_statistics: true
    predict_ancestry: true
    binary_association: false
