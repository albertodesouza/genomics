project:
  name: "reference_only_dataset_genes_1000_all"
  description: "Reference genome AlphaGenome predictions for genes_1000_all 3 ontologies"
  output_dir: "/dados/GENOMICS_DATA/top3/reference_only_results_genes_1000_all_3ontologies"

debug:
  create_dataset_with_reference_genome_only: true

data_sources:
  metadata_csv: "../../docs/historical/1000-genomes/1000_genomes_metadata.csv"
  reference:
    fasta: "/dados/GENOMICS_DATA/top3/refs/GRCh38_full_analysis_set_plus_decoy_hla.fa"
    name: "GRCh38"
  vcf_pattern: "/dados/GENOMICS_DATA/top3/longevity_dataset/vcf_chromosomes/1kGP_high_coverage_Illumina.{chrom}.filtered.SNV_INDEL_SV_phased_panel.vcf.gz"

sample_selection:
  level: "population"
  samples_per_group: 1
  include_groups:
    - CEU
  exclude_groups: []
  sex_filter: "all"
  random_seed: 42

build_window_params:
  mode: "gene"
  gene:
    symbol: null
    id: null
    gene_list_file: ../docs/ancestry_gene_list.txt
  gtf_feather: null
  window_size: 524288
  skip_h2: false
  also_iupac: false
  predict: true
  api_key: "${ALPHAGENOME_API_KEY}"
  outputs: "RNA_SEQ"
  ontology: "CL:1000458,CL:0000346,CL:2000092"
  all_tissues: false
  api_rate_limit_delay: 0.5

pipeline:
  steps:
    analyze_metadata: true
    select_samples: true
    validate_vcfs: true
    run_predictions: true
    generate_report: true
    generate_dataset_metadata: true
  parallel:
    enabled: false
    n_workers: 1
  resume_from_checkpoint: true
  checkpoint_file: "reference_only_dataset_genes_1000_all_checkpoint.json"

logging:
  level: "INFO"
  log_file: "reference_only_dataset_genes_1000_all.log"
  console_output: true
