# SNP-only version of gene_1000_all.yaml.
# It keeps the same samples/genes/AlphaGenome settings, but filters the VCF to
# SNPs before bcftools consensus so personalized FASTAs remain reference-length.
project:
  name: "non_longevous_dataset_genes_1000_all_snps_only"
  description: "Gene dataset rebuilt from SNPs only, excluding INDEL/SV before consensus"
  output_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all_snps_only"

debug:
  create_dataset_with_reference_genome_only: false

data_sources:
  metadata_csv: "../../docs/1000_genomes_metadata.csv"
  reference:
    fasta: "/dados/GENOMICS_DATA/top3/refs/GRCh38_full_analysis_set_plus_decoy_hla.fa"
    name: "GRCh38"
  vcf_pattern: "/dados/GENOMICS_DATA/top3/longevity_dataset/vcf_chromosomes/1kGP_high_coverage_Illumina.{chrom}.filtered.SNV_INDEL_SV_phased_panel.vcf.gz"

sample_selection:
  level: "population"
  samples_per_group: 10000
  include_groups: []
  exclude_groups: []
  sex_filter: "all"
  random_seed: 42

build_window_params:
  mode: "gene"
  gene:
    symbol: "CYP2B6"
    id: null
    gene_list_file: ../docs/ancestry_gene_list.txt
  snp:
    snp_list_file: "../../third_party/FROGAncestryCalc/SNPInfo/55_aisnps_alleles_grch38.txt"
  gtf_feather: null
  window_size: 524288
  variant_filter: "snps"
  skip_h2: false
  also_iupac: false
  predict: true
  api_key: "${ALPHAGENOME_API_KEY}"
  outputs: "RNA_SEQ"
  ontology: "CL:1000458,CL:0000346,CL:2000092"
  all_tissues: false
  api_rate_limit_delay: 0.5

pipeline:
  steps:
    analyze_metadata: true
    select_samples: true
    validate_vcfs: true
    run_predictions: true
    generate_report: true
    generate_dataset_metadata: true
  parallel:
    enabled: true
    n_workers: 4
  resume_from_checkpoint: true
  checkpoint_file: "non_longevous_dataset_genes_1000_all_snps_only_checkpoint.json"

logging:
  level: "INFO"
  log_file: "non_longevous_dataset_genes_1000_all_snps_only.log"
  console_output: true
