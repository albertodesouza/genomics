# Neural Ancestry Predictor - SNP-only gene dataset.
# The dataset is generated by build_non_longevous_dataset with
# build_window_params.variant_filter: "snps". This model consumes the raw
# AlphaGenome predictions directly, without genotype_based_predictor alignment.

dataset_input:
  dataset_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all_snps_only"
  alphagenome_outputs:
    - "rna_seq"
  haplotype_mode: "H1+H2"
  window_center_size: 32768
  downsample_factor: 1
  genes_to_use:
    - "MC1R"
    - "TYRP1"
    - "TYR"
    - "SLC45A2"
    - "DDB1"
    - "EDAR"
    - "MFSD12"
    - "OCA2"
    - "HERC2"
    - "SLC24A5"
    - "TCHH"
  ontology_terms:
    - "CL:1000458"
    - "CL:0000346"
    - "CL:2000092"
  normalization_method: "log"
  normalization_value: 0.0
  processed_cache_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_runs_genes_1000_all_snps_only"

output:
  prediction_target: "superpopulation"
  known_classes: null

model:
  type: "CNN2"
  hidden_layers:
    - 100
    - 40
  activation: "relu"
  dropout_rate: 0.5
  cnn:
    kernel_size: [6, 32]
    num_filters: 5
    stride: [6, 32]
    padding: 0
    pool_size: null
  cnn2:
    num_filters_stage1: 16
    kernel_stage1: [6, 32]
    stride_stage1: [6, 32]
    num_filters_stage2: 32
    num_filters_stage3: 64
    kernel_stages23: [1, 5]
    stride_stages23: [1, 2]
    padding_stages23: [0, 2]
    fc_hidden_size: 256
    global_pool_type: "avg"

data_loading:
  loading_strategy: "lazy"
  cache_size: 50

training:
  optimizer: "adam"
  learning_rate: 0.001
  loss_function: "cross_entropy"
  batch_size: 50
  num_epochs: 400
  validation_frequency: 3
  lr_scheduler:
    enabled: true
    type: "cosine_warm_restarts"
    mode: "min"
    factor: 0.5
    patience: 30
    min_lr: 0.0000001
    step_size: 30
    T_max: 300
    eta_min: 0.0000001
    T_0: 50
    T_mult: 1

data_split:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 13
  family_split_mode: "family_aware"
  balancing_strategy: "shuffle"
  strict_determinism: true

wandb:
  use_wandb: true
  project_name: "neural-ancestry-predictor-genes-1000-all-snps-only"
  run_name: null
  log_frequency: 100

checkpointing:
  checkpoint_dir: "models"
  save_during_training: true
  save_frequency: 100
  load_checkpoint: null

debug:
  enable_visualization: false
  max_samples_per_epoch: null
  visualization:
    width: 600
    height: 660
  taint_at_cache_save: false
  taint_at_runtime: false
  interpretability:
    enabled: false
    method: "gradcam"
    save_images: true
    output_dir: "interpretability_results"
    gradcam:
      target_layer: "auto"
      target_class: "AFR"
    deeplift:
      baseline: "zeros"
      target_class: "predicted"

mode: "train"
test_dataset: "test"
