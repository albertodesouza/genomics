dataset_input:
  view_path: "/home/breno/I2CA/genomics/genotype_based_predictor/views/genes_1000_all_3ontologies.view.json"
  processed_cache_dir: "/dados/GENOMICS_DATA/v1/1kG_high_coverage_runs"
  cache_processed_tensors: true
  tensor_layout: "haplotype_channels"
  selected_track_index: 0
  indel_include_valid_mask: true
  alignment_mapping: "bcftools_chain"
  consensus_dataset_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all"
  alignment_axis_splits:
    - train
    - val


output:
  prediction_target: "superpopulation"
  known_classes: ["AFR", "AMR", "EAS", "EUR", "SAS"]

model:
  type: "SVM"
  sklearn:
    pca_components: 32
    use_pca_cache: true
    pca_align_n_train: false
    svm:
      C: 1.0
      max_iter: 20000
      class_weight: "balanced"
      calibrate_probabilities: false

training:
  optimizer: "adam"
  learning_rate: 0.001
  weight_decay: 0.0
  loss_function: "cross_entropy"
  batch_size: 16
  num_epochs: 1
  validation_frequency: 1
  lr_scheduler:
    enabled: false

data_split:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 13
  family_split_mode: "family_aware"
  balancing_strategy: "shuffle"
  strict_determinism: true

wandb:
  use_wandb: false
  project_name: "genotype-based-predictor-pca-svm"
  run_name: null
  log_frequency: 100

checkpointing:
  checkpoint_dir: "models"
  save_frequency: 100
  save_during_training: true
  load_checkpoint: null

debug:
  enable_visualization: false
  force_pca_cache_rebuild: false
  max_samples_per_epoch: null
  taint_at_cache_save: false
  taint_at_runtime: false
  visualization: {}

data_loading:
  loading_strategy: "lazy"
  cache_size: 50

mode: "train"
test_dataset: "test"
