dataset_input:
  view_path: "/home/breno/I2CA/genomics/genotype_based_predictor/views/genes_1000_all_3ontologies.view.json"
  processed_cache_dir: "/dados/GENOMICS_DATA/v1/1kG_high_coverage_runs"
  cache_processed_tensors: true
  tensor_layout: "haplotype_channels"
  feature_mode: "signals_only"
  selected_track_index: 0
  indel_include_valid_mask: false
  indel_include_snp_mask: false
  alignment_mapping: "bcftools_chain"
  consensus_dataset_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all"
  alignment_axis_splits:
    - train
    - val

output:
  prediction_target: "pigmentation"
  known_classes:
    - "strong pigmentation"
    - "weak pigmentation"
  derived_targets:
    pigmentation:
      source_field: "population"
      exclude_unmapped: true
      class_map:
        strong pigmentation: ["YRI", "ESN", "LWK", "MSL", "GWD"]
        weak pigmentation: ["FIN", "CEU", "GBR"]

model:
  type: "CNN2"
  hidden_layers: [100, 40]
  activation: "relu"
  dropout_rate: 0.5
  cnn2:
    num_filters_stage1: 16
    kernel_stage1: [6, 32]
    stride_stage1: [6, 32]
    num_filters_stage2: 32
    num_filters_stage3: 64
    kernel_stages23: [1, 5]
    stride_stages23: [1, 2]
    padding_stages23: [0, 2]
    global_pool_type: "max"
    fc_hidden_size: 256

training:
  optimizer: "adam"
  learning_rate: 0.001
  weight_decay: 0.0001
  loss_function: "cross_entropy"
  batch_size: 512
  num_epochs: 300
  validation_frequency: 3
  lr_scheduler:
    enabled: true
    type: "cosine_warm_restarts"
    mode: "min"
    factor: 0.5
    patience: 30
    min_lr: 0.0000001
    step_size: 30
    T_max: 300
    eta_min: 0.0000001
    T_0: 50
    T_mult: 1

data_split:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  random_seed: 13
  family_split_mode: "family_aware"
  balancing_strategy: "shuffle"
  strict_determinism: true

wandb:
  use_wandb: true
  project_name: "genotype-based-predictor-genes-1000-all-3ontologies-pigmentation"
  run_name: "signals-only"
  log_frequency: 100

checkpointing:
  checkpoint_dir: "models"
  save_frequency: 100
  save_during_training: true
  load_checkpoint: null

debug:
  enable_visualization: false
  force_pca_cache_rebuild: false
  max_samples_per_epoch: null
  taint_at_cache_save: false
  taint_at_runtime: false
  visualization: {}

data_loading:
  loading_strategy: "preload"
  cache_size: 50
  train_num_workers: 0
  val_num_workers: 0

mode: "train"
test_dataset: "test"
