site_name: Genomics Workspace
site_description: Multi-pipeline genomics workspace documentation
repo_url: https://github.com/albertodesouza/genomics
docs_dir: docs
site_dir: site
theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Environment: getting-started/environment.md
      - Building 1000 Genomes Dataset: getting-started/building-1000-genomes-dataset.md
      - Training And Running Predictions: getting-started/training-and-running-predictions.md
  - Concepts:
      - Data And Results: concepts/data-and-results.md
      - Configuration: concepts/configuration.md
      - Experiments: concepts/experiments.md
      - Dynamic Indel Tensor Alignment: concepts/dynamic-indel-tensor-alignment.md
      - Preprocessing And Leakage: concepts/preprocessing-and-leakage.md
  - Components:
      - Overview: components/index.md
      - Genomes Analyzer: components/genomes-analyzer.md
      - Genotype Predictor: components/genotype-predictor.md
      - Variant Transformer: components/variant-transformer.md
      - SNP Ancestry: components/snp-ancestry.md
      - VCF To 23andMe: components/vcf-to-23andme.md
      - AlphaGenome: components/alphagenome.md
      - Dataset Builders: components/dataset-builders.md
      - Native And Third-Party: components/native-and-third-party.md
      - Legacy: components/legacy.md
  - Operations:
      - Scripts: operations/scripts.md
      - Monster Install: operations/monster.md
  - Guides:
      - AlphaGenome Sequences And Outputs: guides/alphagenome-sequences.md
  - Reference:
      - CLI: reference/cli.md
      - Config Schemas: reference/configs.md
      - Data Registry: reference/data-registry.md
      - Repository Layout: reference/repository-layout.md
  - Historical Notes:
      - Architecture Migration Notes: historical/ARCHITECTURE.md
      - Research Pipelines: historical/RESEARCH_PIPELINES.md
      - Important Experiments: historical/IMPORTANT_EXPERIMENTS.md
      - Migration Plan: historical/MIGRATION.md
      - Applied AlphaGenome Fixes: historical/APPLIED_FIXES.md
      - Legacy Download Sequences: historical/alphagenome/DOWNLOAD_SEQUENCES.md
      - Legacy AlphaGenome Outputs: historical/alphagenome/AVAILABLE_OUTPUTS.md
      - Legacy Supported Sequence Sizes: historical/alphagenome/SUPPORTED_SIZES.md
  - Historical References:
      - 1000 Genomes High Coverage README: historical/1000-genomes/20190405_1000G_2504_high_cov_README.md
      - 1000 Genomes Data Reuse README: historical/1000-genomes/20190405_1000G_2504_high_cov_data_reuse_README.md
