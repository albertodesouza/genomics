# Binary pigmentation classification restricted to the same 32 kb gene windows
# used by neural_ancestry_predictor/configs/genes_1000_all.yaml.

input:
  splits_metadata: "/dados/GENOMICS_DATA/top3/non_longevous_results_runs_genes_1000_all/datasets/rna_seq_H1_32768_ds1_log_shuf_split0.7-0.15-0.15_seed13/splits_metadata.json"
  individuals_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all/individuals"
  vcf_pattern: "/dados/GENOMICS_DATA/top3/longevity_dataset/vcf_chromosomes/1kGP_high_coverage_Illumina.{chrom}.filtered.SNV_INDEL_SV_phased_panel.vcf.gz"
  chromosomes:
    - "chr1"
    - "chr2"
    - "chr5"
    - "chr9"
    - "chr11"
    - "chr15"
    - "chr16"
    - "chr19"
  validate_family_aware_splits: false

conversion:
  output_filename: "{sample_id}_genes_1000_all_w32768_23andme.txt"
  skip_no_rsid: true
  filter_by_chip_panel: false
  format_version: "V5"
  annotate_dbsnp: true
  genome_build: "GRCh38"
  ref_dir: "/dados/GENOMICS_DATA/top3/refs"
  region_bed: "genes_1000_all_w32768.bed"

statistics:
  output_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all"
  reference_subsets:
    - "train"
  min_maf: 0.001
  max_snps: null
  snp_panel: null
  region_bed: "genes_1000_all_w32768.bed"

output:
  prediction_target: "pigmentation"
  known_classes:
    - "strong pigmentation"
    - "weak pigmentation"
  derived_targets:
    pigmentation:
      source_field: "population"
      exclude_unmapped: true
      class_map:
        strong pigmentation: ["YRI", "ESN", "LWK", "MSL", "GWD"]
        weak pigmentation: ["FIN", "CEU", "GBR"]

prediction:
  haplotype_mode: "H1"
  method: "mle"
  evaluation_subsets:
    - "train"
    - "val"
    - "test"
  results_dir: "/dados/GENOMICS_DATA/top3/non_longevous_results_genes_1000_all/ancestry_results_pigmentation_selected_genes"
  admixture_em:
    max_iter: 1000
    tol: 1.0e-7
  admixture_mle:
    n_restarts: 20

pipeline:
  steps:
    generate_23andme: true
    compute_statistics: true
    predict_ancestry: true
    binary_association: false
